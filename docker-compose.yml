services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: locplus-frontend
    expose:
      - "4173"
    networks:
      - locplus-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: locplus-backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - locplus-net

  postgres:
    build:
      context: ./database
      dockerfile: Dockerfile
    container_name: locplus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - locplus-net

  minio:
    build:
      context: ./bucket
      dockerfile: Dockerfile
    container_name: locplus-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    networks:
      - locplus-net

  nginx:
    image: nginx:1.27-alpine
    container_name: locplus-nginx
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - frontend
      - backend
    volumes:
      - ./nginx/sites-enabled/locplus.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - locplus-net

volumes:
  postgres_data:
  minio_data:

networks:
  locplus-net:
    driver: bridge
